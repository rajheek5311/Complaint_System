{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm auth-card">
      <div class="card-body p-4">
        <h3 class="text-center mb-1"><i class="bi bi-person-plus"></i> Create Account</h3>
        <p class="text-center text-muted mb-4">Join TicketDesk </p>

        <form method="POST" action="{{ url_for('auth.register') }}">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" required placeholder="Jane Doe">
          </div>
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" name="email" required placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required placeholder="••••••••">
          </div>
          <div class="mb-3">
            <label class="form-label">Account Type</label>
            <select class="form-select" name="role">
              <option value="user" selected>Customer (raise complaints)</option>
              <option value="agent">Support Agent (resolve tickets)</option>
            </select>
            <div class="form-text">
              Note: Admin accounts can't be self-registered for security reasons.
              A default admin login is shown on the Login page.
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <hr>
        <p class="text-center mb-0">Already have an account?
          <a href="{{ url_for('auth.login') }}">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
