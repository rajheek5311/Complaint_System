{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm auth-card">
      <div class="card-body p-4">
        <h3 class="text-center mb-1"><i class="bi bi-headset"></i> TicketDesk </h3>
        <p class="text-center text-muted mb-4">Login to your account</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" name="email" required placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <hr>
        <p class="text-center mb-0">Don't have an account?
          <a href="{{ url_for('auth.register') }}">Register here</a>
        </p>

        <div class="alert alert-secondary mt-3 small mb-0">
          <strong>Default Admin Login (for testing):</strong><br>
          Email: <code>admin@gmail.com</code><br>
          Password: <code>admin123</code>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
